services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: satilligence
      POSTGRES_PASSWORD: ${DB_PASSWORD:-satilligence_dev}
      POSTGRES_DB: satilligence
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satilligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://satilligence:${DB_PASSWORD:-satilligence_dev}@db:5432/satilligence?sslmode=disable
      - BLINK_API_KEY=${BLINK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MACAROON_SECRET=${MACAROON_SECRET}
      - MARKUP_PERCENT=${MARKUP_PERCENT:-5}
      - MIN_DEPOSIT_SATS=${MIN_DEPOSIT_SATS:-5000}
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Rails Web App
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://satilligence:${DB_PASSWORD:-satilligence_dev}@db:5432/satilligence_web?sslmode=disable
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - RAILS_SERVE_STATIC_FILES=true
      - API_URL=http://api:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
