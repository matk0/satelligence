services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BLINK_API_KEY=${BLINK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MACAROON_SECRET=${MACAROON_SECRET}
      - MARKUP_PERCENT=${MARKUP_PERCENT:-5}
      - MIN_DEPOSIT_SATS=${MIN_DEPOSIT_SATS:-5000}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - MAX_STRIKES=${MAX_STRIKES:-3}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
