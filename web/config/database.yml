default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: satilligence_web_development

test:
  <<: *default
  database: satilligence_web_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
