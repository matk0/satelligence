services:
  # Caddy reverse proxy with automatic SSL
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  # Go API Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BLINK_API_KEY=${BLINK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MACAROON_SECRET=${MACAROON_SECRET}
      - MARKUP_PERCENT=${MARKUP_PERCENT:-5}
      - MIN_DEPOSIT_SATS=${MIN_DEPOSIT_SATS:-5000}
      - LNBITS_URL=http://lnbits:5000
      - LNBITS_ADMIN_KEY=${LNBITS_ADMIN_KEY}
      - PORT=8080
      - BLACKLIST_FILE=/data/blacklist.json
    volumes:
      - api_data:/data
    depends_on:
      lnbits:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Rails Web App
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - RAILS_SERVE_STATIC_FILES=true
      - GO_API_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy

  # LNbits - Hosted wallet service
  lnbits:
    image: lnbits/lnbits:latest
    restart: unless-stopped
    environment:
      - LNBITS_BACKEND_WALLET_CLASS=BlinkWallet
      - BLINK_API_ENDPOINT=https://api.blink.sv/graphql
      - BLINK_WS_ENDPOINT=wss://ws.blink.sv/graphql
      - BLINK_TOKEN=${BLINK_API_KEY}
      - LNBITS_ADMIN_UI=true
      - LNBITS_SITE_TITLE=Trandor Wallets
      - LNBITS_DEFAULT_WALLET_NAME=Agent Wallet
      - LNBITS_EXTENSIONS_DEFAULT_INSTALL=nwcprovider
      # NWC Provider - use external Nostr relay for NWC communication
      - NWCPROVIDER_RELAY=wss://relay.damus.io
      - NWCPROVIDER_RELAY_ALIAS=wss://relay.damus.io
    volumes:
      - lnbits_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
  lnbits_data:
  api_data:
